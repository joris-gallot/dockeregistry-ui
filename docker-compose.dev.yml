services:
  # Simple registry without auth
  registry:
    image: registry:3
    ports:
      - "5000:5000"
    volumes:
      - ./dev/registry.yml:/etc/distribution/config.yml:ro
      - registry-data:/var/lib/registry

  # Registry with Basic auth
  registry-auth:
    image: registry:3
    ports:
      - "5001:5000"
    volumes:
      - ./dev/registry-auth.yml:/etc/distribution/config.yml:ro
      - ./auth:/auth
      - registry-auth-data:/var/lib/registry

volumes:
  registry-data:
  registry-auth-data:
