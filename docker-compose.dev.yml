services:
  # Simple registry without auth
  registry:
    image: registry:3
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry

  # Registry with Basic auth
  registry-auth:
    image: registry:3
    ports:
      - "5001:5000"
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./auth:/auth
      - registry-auth-data:/var/lib/registry

volumes:
  registry-data:
  registry-auth-data:
