services:
  # Simple registry without auth
  registry:
    image: registry:3
    ports:
      - "5000:5000"
    environment:
      # Allow CORS requests from Vite dev server
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: '["http://localhost:5173"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '["HEAD", "GET", "OPTIONS", "DELETE"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '["Authorization", "Accept", "Cache-Control"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: '["Docker-Content-Digest"]'
      # Enable image deletion
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry

  # Registry with Basic auth (uncomment to test authentication)
  # registry-auth:
  #   image: registry:3
  #   ports:
  #     - "5001:5000"
  #   environment:
  #     REGISTRY_AUTH: htpasswd
  #     REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
  #     REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
  #     REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: '["http://localhost:5173", "http://localhost:5174"]'
  #     REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '["HEAD", "GET", "OPTIONS", "DELETE"]'
  #     REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '["Authorization", "Accept", "Cache-Control"]'
  #     REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: '["Docker-Content-Digest"]'
  #     REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials: '["true"]'
  #     REGISTRY_STORAGE_DELETE_ENABLED: "true"
  #   volumes:
  #     - ./auth:/auth
  #     - registry-auth-data:/var/lib/registry

volumes:
  registry-data:
